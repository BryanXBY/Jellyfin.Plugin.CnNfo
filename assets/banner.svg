<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0c1d3a"/>
            <stop offset="100%" stop-color="#103057"/>
        </linearGradient>
        <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#41C7A8"/>
            <stop offset="100%" stop-color="#3CC1E0"/>
        </linearGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6"/>
        </filter>
    </defs>

    <rect width="800" height="400" fill="url(#bg)"/>

    <!-- decorative dots -->
    <g fill="#ffffff" opacity="0.06">
        <circle cx="70"  cy="80"  r="3"/>
        <circle cx="200" cy="50"  r="2"/>
        <circle cx="330" cy="90"  r="2.5"/>
        <circle cx="460" cy="40"  r="3"/>
        <circle cx="600" cy="80"  r="2"/>
        <circle cx="730" cy="60"  r="2.5"/>
        <circle cx="90"  cy="330" r="3"/>
        <circle cx="220" cy="350" r="2"/>
        <circle cx="350" cy="320" r="2.5"/>
        <circle cx="500" cy="360" r="3"/>
        <circle cx="640" cy="330" r="2"/>
        <circle cx="760" cy="350" r="2.5"/>
    </g>

    <!-- Jellyfin-like jelly shape -->
    <g transform="translate(110,210)" opacity="0.95">
        <path d="M0,0 q60,-130 120,0 q-30,30 -60,30 q-30,0 -60,-30 z"
              fill="url(#brand)" filter="url(#soft)"/>
        <path d="M0,0 q60,-130 120,0 q-30,30 -60,30 q-30,0 -60,-30 z"
              fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- text -->
    <g font-family="'PingFang SC','Microsoft YaHei',Helvetica,Arial,sans-serif" fill="#ffffff">
        <text x="300" y="160" font-size="60" font-weight="700">CnNfo</text>
        <text x="300" y="210" font-size="22" opacity="0.85">面向中国用户的 Jellyfin 元数据插件</text>
        <text x="300" y="250" font-size="18" opacity="0.7">豆瓣 → IMDB → TMDB · 智能译名 · 文件名识别 · 内置缓存</text>
        <text x="300" y="320" font-size="14" opacity="0.55">github.com/BryanXBY/Jellyfin.Plugin.CnNfo</text>
    </g>

    <!-- bottom accent bar -->
    <rect x="0" y="392" width="800" height="8" fill="url(#brand)"/>
</svg>
