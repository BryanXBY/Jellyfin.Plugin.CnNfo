name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.CnNfo.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.CnNfo.sln -c Release --no-restore

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.CnNfo
          path: src/Jellyfin.Plugin.CnNfo/bin/Release/net9.0/Jellyfin.Plugin.CnNfo.dll
