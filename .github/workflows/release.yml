name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build Jellyfin.Plugin.CnNfo.sln -c Release

      - name: Package
        id: pkg
        run: |
          set -e
          OUT="cnnfo-${{ steps.ver.outputs.version }}.zip"
          ROOT="$(pwd)"
          STAGE=$(mktemp -d)
          rm -f "$ROOT/$OUT"
          cd src/Jellyfin.Plugin.CnNfo/bin/Release/net8.0/
          # 把第三方依赖 dll 一起打包（AngleSharp / AnitomySharp / TMDbLib + 传递依赖）
          # 排除 Jellyfin / Emby / Microsoft.Extensions / System 这些服务器已加载的
          shopt -s nullglob
          for f in *.dll *.xml; do
            case "$f" in
              MediaBrowser.*|Jellyfin.Controller*|Jellyfin.Model*|Jellyfin.Data*|Jellyfin.Naming*|Jellyfin.Extensions*|Jellyfin.Server*|Jellyfin.Common*|Emby.*|Microsoft.Extensions.*|Microsoft.AspNetCore.*|System.*|netstandard*|mscorlib*)
                continue ;;
            esac
            cp "$f" "$STAGE/"
          done
          cd "$STAGE"
          echo "Bundling:"
          ls -la
          zip "$ROOT/$OUT" *.dll *.xml 2>/dev/null || zip "$ROOT/$OUT" *.dll
          cd "$ROOT"
          ls -la "$OUT"
          MD5=$(md5sum "$OUT" | awk '{print $1}')
          SIZE=$(stat -c %s "$OUT")
          echo "Final zip: $OUT, size=$SIZE bytes, md5=$MD5"
          echo "zip=$OUT" >> "$GITHUB_OUTPUT"
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"

      # 先把 GitHub Release 建好，即使 manifest 步骤失败也至少有可下载的 zip
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          body: |
            ## CnNfo ${{ steps.ver.outputs.version }}
            - md5: `${{ steps.pkg.outputs.md5 }}`
            - Jellyfin 仓库 manifest 已自动更新（见 main 分支 manifest.json）。

      - name: Update manifest.json on main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          python3 .github/scripts/update-manifest.py \
            --version "${{ steps.ver.outputs.version }}" \
            --checksum "${{ steps.pkg.outputs.md5 }}" \
            --url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pkg.outputs.zip }}"
          git add manifest.json
          git diff --cached --quiet && echo "manifest unchanged, skipping commit" && exit 0 || true
          git commit -m "release: ${{ github.ref_name }}"
          git push origin main
